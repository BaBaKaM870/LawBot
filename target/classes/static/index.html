<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LawBot — Simulation de Procès</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════ WELCOME SCREEN ══════════════════════ -->
  <div id="welcome-screen">
    <div class="welcome-bg"></div>
    <div class="welcome-content">
      <div class="welcome-gavel">⚖</div>
      <h1>LAWBOT</h1>
      <p class="welcome-tagline">Simulation de Procès</p>
      <p class="welcome-intro">
        Incarnez l'avocat de la défense. Interrogez les témoins,
        contestez les preuves et convainquez le jury de l'innocence de votre client.
      </p>
      <button class="btn-primary" id="start-btn">Commencer une Affaire</button>
    </div>
  </div>

  <!-- ══════════════════════ GAME SCREEN ═══════════════════════ -->
  <div id="game-screen" class="hidden">

    <!-- Header fixe -->
    <header class="game-header">
      <div class="header-logo">⚖ LAWBOT</div>

      <nav class="phase-nav" id="phase-nav">
        <!-- Généré par JS -->
      </nav>

      <div class="header-stats">
        <div class="stat-group">
          <span class="stat-label">Jury</span>
          <div class="jury-bar-wrap">
            <div class="jury-bar-track">
              <div class="jury-bar-fill" id="jury-fill"></div>
            </div>
          </div>
          <span class="stat-value" id="jury-pct">50%</span>
        </div>
        <div class="stat-group">
          <span class="stat-label">Actions</span>
          <span class="stat-value" id="score-val">0/0</span>
        </div>
      </div>
    </header>

    <!-- Corps du jeu -->
    <div class="game-body">

      <!-- Sidebar : info + journal -->
      <aside class="sidebar">
        <div class="case-card">
          <h2 class="case-title" id="case-title">—</h2>
          <span class="crime-badge" id="crime-badge"></span>
          <div class="suspect-row">
            <span class="suspect-icon">👤</span>
            <div>
              <div class="info-label">Accusé(e)</div>
              <strong id="suspect-name"></strong>
            </div>
          </div>
          <p class="case-desc" id="case-desc"></p>
        </div>

        <div class="events-panel">
          <h3 class="events-title">📋 Journal</h3>
          <div id="events-list"></div>
        </div>
      </aside>

      <!-- Contenu principal (change selon la phase) -->
      <main class="phase-panel" id="phase-panel">
        <!-- Injecté par JS -->
      </main>

    </div>
  </div>

  <!-- ══════════════════════ VERDICT OVERLAY ═════════════════════ -->
  <div id="verdict-overlay" class="hidden">
    <div class="verdict-box">
      <div class="verdict-gavel">⚖</div>
      <h2 class="verdict-title">VERDICT DU JURY</h2>
      <div class="verdict-accused">Accusé(e) : <span id="v-suspect"></span></div>
      <div class="verdict-result" id="v-result">—</div>

      <div class="verdict-details">

        <div class="v-row">
          <span class="v-label">Votes du jury</span>
          <div class="juror-icons" id="v-jurors"></div>
          <span class="v-sub" id="v-votes"></span>
        </div>

        <div class="v-row">
          <span class="v-label">Votre score</span>
          <div class="score-track">
            <div class="score-fill" id="v-score-fill"></div>
          </div>
          <span class="v-sub" id="v-score"></span>
        </div>

        <div class="v-truth" id="v-truth"></div>

      </div>

      <p class="verdict-explanation" id="v-explanation"></p>

      <button class="btn-primary btn-replay" id="replay-btn">🔄 Nouvelle Affaire</button>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast hidden"></div>

  <script src="game.js"></script>
</body>
</html>
